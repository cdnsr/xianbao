# Android Release (main only)
#
# On every push to main (except [skip ci]):
# 1) Validate/decode Android keystore from GitHub Secrets
# 2) Bump pubspec version + publish/version.json and commit with [skip ci]
# 3) flutter build apk --release --split-per-abi
# 4) Publish public GitHub Release with APKs
#
# User-facing version is versionName only: 1.4.9 / 1.4.10 (no +build).
# Client update check reads publish/version.json (multi-CDN mirrors).
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

name: Android Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Decode Android keystore from secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "Missing secret: $v" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure repository Secrets before releasing. See docs/CI_RELEASE.md" >&2
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          printf '%s\n' \
            "storePassword=${ANDROID_KEYSTORE_PASSWORD}" \
            "keyPassword=${ANDROID_KEY_PASSWORD}" \
            "keyAlias=${ANDROID_KEY_ALIAS}" \
            "storeFile=upload-keystore.jks" \
            > android/key.properties
          ls -la android/app/upload-keystore.jks
          echo "key.properties written (secrets redacted)"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and publish/version.json
        id: version
        shell: bash
        run: |
          set -euo pipefail
          line="$(grep -E '^version:' pubspec.yaml | head -n1 | tr -d '[:space:]')"
          raw="${line#version:}"
          name="${raw%%+*}"
          code="${raw##*+}"
          if [[ ! "$name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid versionName in pubspec: $name" >&2
            exit 1
          fi
          if [[ ! "$code" =~ ^[0-9]+$ ]]; then
            if [[ "$raw" == "$name" ]]; then
              code=0
            else
              echo "Invalid versionCode in pubspec: $code" >&2
              exit 1
            fi
          fi

          IFS='.' read -r major minor patch <<< "$name"
          patch=$((patch + 1))
          new_name="${major}.${minor}.${patch}"

          run_no="${{ github.run_number }}"
          new_code=$((code + 1))
          if (( run_no > new_code )); then
            new_code=$run_no
          fi

          new_full="${new_name}+${new_code}"
          sed -i -E "s/^version: .*/version: ${new_full}/" pubspec.yaml
          echo "Bumped version: ${raw} -> ${new_full} (display: ${new_name})"

          # Short release notes for clients (version.json desc).
          short_sha="$(echo '${{ github.sha }}' | cut -c1-7)"
          desc="$(printf '线报酷 %s\n自动构建自 main（%s）\n推荐下载 armv8 安装包。' "$new_name" "$short_sha")"

          mkdir -p publish
          export VERSION_NAME="$new_name"
          export VERSION_DESC="$desc"
          python3 scripts/ci_update_version_json.py

          {
            echo "version_name=${new_name}"
            echo "version_code=${new_code}"
            echo "version_full=${new_full}"
            echo "tag=v${new_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        shell: bash
        run: |
          set -euo pipefail
          git add pubspec.yaml publish/version.json
          if git diff --cached --quiet; then
            echo "No version change to commit"
            exit 0
          fi
          git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }} [skip ci]"
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push failed (attempt $i), rebasing..."
            git pull --rebase origin main
            sleep 2
          done
          exit 1

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APKs (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.version_code }}"

      - name: Package versioned APKs
        shell: bash
        run: |
          set -euo pipefail
          out="build/app/outputs/flutter-apk"
          ver="${{ steps.version.outputs.version_name }}"
          mkdir -p dist
          cp "$out/app-armeabi-v7a-release.apk" "dist/xianbao-v${ver}-armv7-release.apk"
          cp "$out/app-arm64-v8a-release.apk" "dist/xianbao-v${ver}-armv8-release.apk"
          cp "$out/app-x86_64-release.apk" "dist/xianbao-v${ver}-x86_64-release.apk"
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: xianbao ${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 线报酷 ${{ steps.version.outputs.version_name }}

            自动构建自 `main`（`${{ github.sha }}`）。

            ### 安装包（推荐真机 armv8）
            - `xianbao-v${{ steps.version.outputs.version_name }}-armv8-release.apk`
            - `xianbao-v${{ steps.version.outputs.version_name }}-armv7-release.apk`
            - `xianbao-v${{ steps.version.outputs.version_name }}-x86_64-release.apk`

            ### 版本
            - 版本号: `${{ steps.version.outputs.version_name }}`

            ### 客户端检测更新
            - `publish/version.json`（raw / jsDelivr 镜像）
          files: |
            dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wipe signing materials from runner
        if: always()
        shell: bash
        run: |
          rm -f android/app/upload-keystore.jks android/key.properties || true